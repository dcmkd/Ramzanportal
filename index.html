<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Govt. of KP - Ramazan Package Portal</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --kp-green: #1e7e34; --kp-dark: #145a25; --kp-gold: #ffcc00; }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #f8f9fa; 
            margin: 0; padding: 0; 
            text-align: center; color: #333;
            overflow-x: hidden;
        }

        /* Simplified Header Section */
        header { 
            background: white; 
            padding: 30px 10px; 
            border-bottom: 8px solid var(--kp-gold);
        }

        .main-logo { 
            width: 150px; 
            height: auto; 
            margin-bottom: 15px;
        }

        .govt-title { 
            font-size: 28px; 
            font-weight: 800; 
            color: var(--kp-green); 
            text-transform: uppercase; 
            margin: 0;
            letter-spacing: 1px;
        }

        .sub-title-area { margin-top: 10px; padding: 0 10px; }
        .package-title { font-size: 18px; font-weight: 600; color: #444; display: block; }
        .district-title { font-size: 22px; font-weight: 800; color: var(--kp-green); margin-top: 5px; display: block; }

        /* Search Section */
        .container { width: 90%; max-width: 850px; margin: 25px auto; }
        .search-box {
            background: white; padding: 30px 20px;
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        
        input { 
            width: 100%; padding: 15px; 
            font-size: 20px; font-weight: bold; text-align: center; 
            border: 2px solid #ccc; border-radius: 10px; outline: none;
            box-sizing: border-box;
        }

        #cnicInput::placeholder {
            font-size: 13px;
            font-weight: normal;
            color: #888;
        }

        .btn-main {
            display: block; width: 100%; 
            margin: 20px auto 0; padding: 18px; 
            color: white; border: none; border-radius: 10px; 
            font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-verify { background: var(--kp-green); }
        .btn-clear { background: #666; }

        /* Status Emojis */
        .status-emoji {
            width: 32px;
            height: auto;
            vertical-align: middle;
            margin: 0 8px;
        }

        /* Result Presentation */
        #result-area { margin-top: 20px; width: 100%; }
        .record-card { background: white; border-radius: 15px; border: 2px solid #e1e1e1; overflow: hidden; text-align: left; }
        .card-header { background: var(--kp-green); color: white; padding: 15px; font-size: 18px; font-weight: bold; text-align: center; }
        
        .data-row { display: flex; flex-direction: column; padding: 12px 20px; border-bottom: 1px solid #f0f0f0; }
        .label { color: #666; font-size: 13px; font-weight: 600; margin-bottom: 2px; }
        .value { color: #000; font-size: 18px; font-weight: 800; }

        .error-text { color: #d9534f; font-size: 18px; font-weight: bold; margin-top: 20px; padding: 0 10px; line-height: 1.6; }

        footer { margin-top: 50px; padding: 20px; color: #999; border-top: 1px solid #eee; font-size: 14px; }

        @media (min-width: 768px) {
            .govt-title { font-size: 36px; }
            .package-title { font-size: 22px; }
            .district-title { font-size: 28px; }
            .data-row { flex-direction: row; }
            .label { width: 40%; font-size: 17px; }
            .value { width: 60%; font-size: 19px; }
            #cnicInput::placeholder { font-size: 18px; }
        }
    </style>
</head>
<body>

    <header>
        <img src="KP_logo.png" alt="Government Logo" class="main-logo">
        <h1 class="govt-title">Government of Khyber Pakhtunkhwa</h1>
        <div class="sub-title-area">
            <span class="package-title">Ramazan Package Payment to Beneficiaries</span>
            <span class="district-title">DISTRICT MALAKAND</span>
        </div>
    </header>

    <div class="container">
        <div class="search-box">
            <input type="text" id="cnicInput" placeholder="Enter 13 digits CNIC No. without (—)" maxlength="13">
            <button id="actionBtn" class="btn-main btn-verify" onclick="handleButtonClick()">VERIFY RECORD</button>
        </div>
        <div id="result-area"></div>
    </div>

    <footer>&copy; 2026 District Administration Malakand</footer>

    <script>
        let paymentData = [];
        let isShowingResult = false;

        function formatExcelDate(serial) {
            if (!serial || isNaN(serial)) return serial; 
            const date = new Date(Math.round((serial - 25569) * 86400 * 1000));
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            return `${day}/${month}/${date.getFullYear()}`;
        }

        async function loadExcelData(fileName) {
            try {
                const response = await fetch(fileName + '?v=' + new Date().getTime());
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer);
                return XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            } catch (e) { return []; }
        }

        window.onload = async function() {
            paymentData = await loadExcelData("payment.xlsx");
            const inputField = document.getElementById("cnicInput");
            
            // Digit-only restriction
            inputField.addEventListener("input", function() {
                this.value = this.value.replace(/[^0-9]/g, '');
            });

            inputField.addEventListener("keypress", (e) => {
                if (e.key === "Enter") { e.preventDefault(); handleButtonClick(); }
            });
        };

        function handleButtonClick() { isShowingResult ? clearRecord() : performSearch(); }

        function clearRecord() {
            document.getElementById('cnicInput').value = "";
            document.getElementById('result-area').innerHTML = "";
            const btn = document.getElementById('actionBtn');
            btn.innerText = "VERIFY RECORD";
            btn.className = "btn-main btn-verify";
            isShowingResult = false;
        }

        function performSearch() {
            const input = document.getElementById('cnicInput').value.trim();
            const resultDiv = document.getElementById('result-area');
            const btn = document.getElementById('actionBtn');
            
            if (!/^[0-9]{13}$/.test(input)) {
                resultDiv.innerHTML = `<p class="error-text">INVALID INPUT<br><span style="font-size:16px; font-weight:normal;">Please input 13 digits CNIC No. without - or spaces</span></p>`;
                return;
            }

            const beneficiary = paymentData.find(row => String(row['cnic'] || "").trim() === input);

            if (beneficiary) {
                const check = (d) => d && String(d).trim() !== "" ? d : 'N/A';

                resultDiv.innerHTML = `
                    <div class="record-card">
                        <div class="card-header">
                            <img src="Hapy.webp" class="status-emoji">
                            BENEFICIARY RECORD FOUND
                            <img src="Hapy.webp" class="status-emoji">
                        </div>
                        <div class="data-row"><div class="label">CNIC Number:</div><div class="value">${check(beneficiary['cnic'])}</div></div>
                        <div class="data-row"><div class="label">Beneficiary Name:</div><div class="value">${check(beneficiary['name'])}</div></div>
                        <div class="data-row"><div class="label">TRX ID:</div><div class="value">${check(beneficiary['cashin_trx_id'])}</div></div>
                        <div class="data-row"><div class="label">Date:</div><div class="value">${formatExcelDate(beneficiary['cashin_date'])}</div></div>
                        <div class="data-row" style="border:none;"><div class="label">Amount:</div><div class="value">Rs. ${check(beneficiary['cashin_amount'])}</div></div>
                    </div>`;
            } else {
                resultDiv.innerHTML = `
                    <p class="error-text">
                        <img src="Sad.webp" class="status-emoji">
                        YOU ARE NOT A REGISTERED BENEFICIARY OF
                        <img src="Sad.webp" class="status-emoji">
                        <br>KP Ramzan Package 2026 - District Malakand
                    </p>`;
            }

            btn.innerText = "CLEAR RECORD";
            btn.className = "btn-main btn-clear";
            isShowingResult = true;
        }
    </script>
</body>
</html>
